# fly.toml app configuration file generated for flowdeck on 2026-04-23T18:44:53Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'flowdeck'
primary_region = 'sjc'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
