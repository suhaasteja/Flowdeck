name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ------------------------------------------------------------------ #
  #  Frontend — typecheck, test, build                                  #
  # ------------------------------------------------------------------ #
  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Unit tests
        run: npx vitest run
        working-directory: frontend

      - name: Build
        run: npm run build

  # ------------------------------------------------------------------ #
  #  Backend — lint, typecheck, test                                    #
  # ------------------------------------------------------------------ #
  backend:
    name: Backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: 'latest'

      - name: Install dependencies
        run: uv sync
        working-directory: backend

      - name: Lint (ruff)
        run: uv run ruff check .
        working-directory: backend
        continue-on-error: true   # advisory — don't fail CI on style

      - name: Tests
        run: uv run pytest tests/ -v
        working-directory: backend
